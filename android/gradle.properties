org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Matikan Kotlin incremental compilation.
# Mencegah error "this and base files have different roots" di Windows
# saat project dan Pub cache berada di drive berbeda (mis. project di E:, pub cache di C:).
kotlin.incremental=false
